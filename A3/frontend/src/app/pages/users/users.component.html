<div class="users-page">
  <div class="page-header">
    <div class="header-left">
      <mat-icon class="page-icon">manage_accounts</mat-icon>
      <div>
        <h1>User Management</h1>
        <span class="record-count">{{dataSource.filteredData.length}} user(s)</span>
      </div>
    </div>
    <button mat-raised-button color="primary" (click)="openAdd()">
      <mat-icon>person_add</mat-icon> Add User
    </button>
  </div>

  <mat-card class="table-card">
    <mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>

    <div class="toolbar">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Search users</mat-label>
        <mat-icon matPrefix>search</mat-icon>
        <input matInput [(ngModel)]="searchText" (input)="applyFilter()" placeholder="Username or role...">
      </mat-form-field>
      <button mat-icon-button (click)="load()" matTooltip="Refresh"><mat-icon>refresh</mat-icon></button>
    </div>

    <div class="table-container">
      <table mat-table [dataSource]="dataSource" matSort class="users-table">

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>#</th>
          <td mat-cell *matCellDef="let u">{{u.id}}</td>
        </ng-container>

        <ng-container matColumnDef="username">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Username</th>
          <td mat-cell *matCellDef="let u">
            <div class="user-cell">
              <div class="avatar">{{u.username?.[0]?.toUpperCase() ?? '?'}}</div>
              <span>{{u.username}}</span>
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Role</th>
          <td mat-cell *matCellDef="let u">
            <span class="role-chip" [class]="u.role">{{u.role}}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="created_at">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Created</th>
          <td mat-cell *matCellDef="let u">{{u.created_at | date:'medium'}}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="actions-header">Actions</th>
          <td mat-cell *matCellDef="let u" class="actions-cell">
            <button mat-icon-button color="primary" (click)="openEdit(u)" matTooltip="Edit">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="openDelete(u)" matTooltip="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns" class="table-row"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td [attr.colspan]="displayedColumns.length" class="no-data">
            <mat-icon>people_outline</mat-icon>
            <span>No users found</span>
          </td>
        </tr>
      </table>
    </div>

    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
  </mat-card>
</div>
